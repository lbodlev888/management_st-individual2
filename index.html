<!doctype html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Albumio — Generator de albume foto</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style type="text/tailwindcss">
    @theme {
      --color-cream: #f5f0e8;
      --color-charcoal: #1a1a1a;
      --color-amber: #c8872a;
      --color-amber-light: #e8a84a;
      --color-muted: #8a8278;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background-color: var(--color-charcoal);
      color: var(--color-cream);
      min-height: 100vh;
    }

    .font-display { font-family: var(--font-display); }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #4a4540;
      transition: border-color 0.2s, background-color 0.2s;
    }
    #drop-zone.drag-over {
      border-color: var(--color-amber);
      background-color: rgba(200,135,42,0.06);
    }

    /* Photo grid layouts */
    .grid-1 { grid-template-columns: 1fr; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }

    /* Photo card */
    .photo-card {
      position: relative;
      overflow: hidden;
      background: #2a2520;
      border-radius: 4px;
      aspect-ratio: 1;
      cursor: grab;
    }
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    .photo-card:hover img { transform: scale(1.04); }

    .photo-card .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 8px;
    }
    .photo-card:hover .overlay { opacity: 1; }

    /* Caption input inside card */
    .caption-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(245,240,232,0.5);
      color: #f5f0e8;
      font-size: 11px;
      width: 75%;
      outline: none;
      font-family: var(--font-body);
    }
    .caption-input::placeholder { color: rgba(245,240,232,0.5); }

    /* Btn delete */
    .btn-delete {
      background: rgba(200,135,42,0.8);
      border: none;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.2s;
    }
    .btn-delete:hover { background: #c0392b; }

    /* Drag reorder */
    .photo-card.dragging { opacity: 0.4; }
    .photo-card.drag-target { outline: 2px solid var(--color-amber); }

    /* Print styles */
    @media print {
      body { background: white; color: black; }
      #app-header, #controls-panel, #toolbar { display: none !important; }
      #album-preview { box-shadow: none !important; background: white !important; }
      .photo-card .overlay { opacity: 1 !important; }
      #album-title-display { color: black !important; }
      #album-date-display { color: #555 !important; }
      .caption-input { color: black !important; border-bottom-color: #333 !important; }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header id="app-header" class="border-b border-white/10 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-sm flex items-center justify-center" style="background:var(--color-amber)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/>
        </svg>
      </div>
      <span class="font-display text-xl tracking-wide">Albumio</span>
    </div>
    <p class="text-sm hidden sm:block" style="color:var(--color-muted)">Generator de albume cu fotografii</p>
  </header>

  <div class="max-w-6xl mx-auto px-4 py-8 flex flex-col gap-8">

    <!-- Controls Panel -->
    <div id="controls-panel" class="rounded-lg p-6 flex flex-col gap-5" style="background:#232020">

      <!-- Album meta -->
      <div class="flex flex-wrap gap-4 items-end">
        <div class="flex flex-col gap-1 flex-1 min-w-48">
          <label class="text-xs uppercase tracking-widest" style="color:var(--color-muted)">Titlu album</label>
          <input id="album-title-input" type="text" placeholder="Album fără titlu"
            class="bg-transparent border-b text-lg font-display outline-none pb-1 w-full"
            style="border-color:#4a4540; color:var(--color-cream);"
            value="Albumul meu" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs uppercase tracking-widest" style="color:var(--color-muted)">Dată</label>
          <input id="album-date-input" type="date"
            class="bg-transparent border-b outline-none pb-1 text-sm"
            style="border-color:#4a4540; color:var(--color-cream); color-scheme:dark;" />
        </div>
      </div>

      <!-- Layout + theme -->
      <div class="flex flex-wrap gap-6 items-center">

        <!-- Columns -->
        <div class="flex flex-col gap-2">
          <label class="text-xs uppercase tracking-widest" style="color:var(--color-muted)">Coloane</label>
          <div class="flex gap-2" id="col-buttons">
            <button data-cols="1" class="col-btn w-9 h-9 rounded text-sm font-medium border transition-all" style="border-color:#4a4540; color:var(--color-muted)">1</button>
            <button data-cols="2" class="col-btn w-9 h-9 rounded text-sm font-medium border transition-all" style="border-color:#4a4540; color:var(--color-muted)">2</button>
            <button data-cols="3" class="col-btn w-9 h-9 rounded text-sm font-medium border active-col" style="border-color:var(--color-amber); color:var(--color-amber)">3</button>
            <button data-cols="4" class="col-btn w-9 h-9 rounded text-sm font-medium border transition-all" style="border-color:#4a4540; color:var(--color-muted)">4</button>
          </div>
        </div>

        <!-- Gap -->
        <div class="flex flex-col gap-2">
          <label class="text-xs uppercase tracking-widest" style="color:var(--color-muted)">Spațiere</label>
          <div class="flex gap-2" id="gap-buttons">
            <button data-gap="0" class="gap-btn px-3 h-9 rounded text-sm border transition-all" style="border-color:#4a4540; color:var(--color-muted)">Fără</button>
            <button data-gap="2" class="gap-btn px-3 h-9 rounded text-sm border active-gap" style="border-color:var(--color-amber); color:var(--color-amber)">Mic</button>
            <button data-gap="4" class="gap-btn px-3 h-9 rounded text-sm border transition-all" style="border-color:#4a4540; color:var(--color-muted)">Mare</button>
          </div>
        </div>

        <!-- Theme -->
        <div class="flex flex-col gap-2">
          <label class="text-xs uppercase tracking-widest" style="color:var(--color-muted)">Temă album</label>
          <div class="flex gap-2" id="theme-buttons">
            <button data-theme="dark" title="Întunecat" class="theme-btn w-9 h-9 rounded-full border-2 active-theme" style="background:#1a1a1a; border-color:var(--color-amber)"></button>
            <button data-theme="light" title="Deschis" class="theme-btn w-9 h-9 rounded-full border-2" style="background:#f5f0e8; border-color:#4a4540"></button>
            <button data-theme="sepia" title="Sepia" class="theme-btn w-9 h-9 rounded-full border-2" style="background:#c8a87a; border-color:#4a4540"></button>
          </div>
        </div>

        <!-- Toolbar actions on right -->
        <div class="ml-auto flex gap-3 flex-wrap">
          <label class="cursor-pointer px-4 py-2 rounded text-sm font-medium transition-all flex items-center gap-2"
            style="background:var(--color-amber); color:white;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Adaugă Fotografii
            <input id="file-input" type="file" accept="image/*" multiple class="hidden" />
          </label>
          <button id="clear-btn" class="px-4 py-2 rounded text-sm font-medium border transition-all"
            style="border-color:#4a4540; color:var(--color-muted);">
            Golește
          </button>
          <button id="print-btn" class="px-4 py-2 rounded text-sm font-medium border transition-all flex items-center gap-2"
            style="border-color:#4a4540; color:var(--color-cream);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Printează / PDF
          </button>
        </div>
      </div>
    </div>

    <!-- Drop Zone (shown when no photos) -->
    <div id="drop-zone" class="rounded-lg flex flex-col items-center justify-center gap-4 py-20 cursor-pointer"
         style="min-height:280px;">
      <div class="w-16 h-16 rounded-full flex items-center justify-center" style="background:#2a2520;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--color-amber)">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/>
        </svg>
      </div>
      <div class="text-center">
        <p class="font-display text-xl mb-1">Trage fotografiile aici</p>
        <p class="text-sm" style="color:var(--color-muted)">sau apasă pentru a selecta fișierele</p>
      </div>
      <p class="text-xs" style="color:var(--color-muted)">JPG, PNG, WEBP, GIF — orice format imagine</p>
    </div>

    <!-- Album Preview -->
    <div id="album-preview" class="rounded-lg overflow-hidden hidden" style="background:#1a1a1a;">
      <!-- Album header -->
      <div id="album-header" class="px-8 pt-8 pb-4 flex items-end justify-between border-b" style="border-color:#2a2520;">
        <div>
          <h2 id="album-title-display" class="font-display text-3xl" style="color:var(--color-cream)">Albumul meu</h2>
          <p id="album-date-display" class="text-sm mt-1" style="color:var(--color-muted)"></p>
        </div>
        <p id="photo-count" class="text-sm" style="color:var(--color-muted)">0 fotografii</p>
      </div>

      <!-- Photo grid -->
      <div id="photo-grid" class="grid p-4" style="gap:8px;">
      </div>
    </div>

  </div>

<script>
  // ── State ──────────────────────────────────────────────
  let photos = [];          // { id, dataUrl, caption }
  let cols = 3;
  let gapSize = 2;
  let currentTheme = 'dark';
  let dragSrcId = null;

  const themes = {
    dark:  { bg: '#1a1a1a', headerBg: '#1a1a1a', titleColor: '#f5f0e8', cardBg: '#2a2520', borderColor: '#2a2520' },
    light: { bg: '#f5f0e8', headerBg: '#ede8e0', titleColor: '#1a1a1a', cardBg: '#ddd8d0', borderColor: '#ccc8c0' },
    sepia: { bg: '#3a2e20', headerBg: '#2e2418', titleColor: '#f0e0c0', cardBg: '#4a3e2a', borderColor: '#3a3020' },
  };

  // ── DOM refs ───────────────────────────────────────────
  const dropZone      = document.getElementById('drop-zone');
  const fileInput     = document.getElementById('file-input');
  const photoGrid     = document.getElementById('photo-grid');
  const albumPreview  = document.getElementById('album-preview');
  const albumHeader   = document.getElementById('album-header');
  const titleDisplay  = document.getElementById('album-title-display');
  const dateDisplay   = document.getElementById('album-date-display');
  const photoCount    = document.getElementById('photo-count');
  const titleInput    = document.getElementById('album-title-input');
  const dateInput     = document.getElementById('album-date-input');

  // Set today as default date
  dateInput.valueAsDate = new Date();

  // ── Upload handling ────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    loadFiles(e.dataTransfer.files);
  });

  fileInput.addEventListener('change', e => loadFiles(e.target.files));

  function loadFiles(fileList) {
    Array.from(fileList).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = ev => {
        photos.push({ id: Date.now() + Math.random(), dataUrl: ev.target.result, caption: '' });
        renderGrid();
      };
      reader.readAsDataURL(file);
    });
  }

  // ── Render ─────────────────────────────────────────────
  function renderGrid() {
    const hasPhotos = photos.length > 0;
    dropZone.classList.toggle('hidden', hasPhotos);
    albumPreview.classList.toggle('hidden', !hasPhotos);

    if (!hasPhotos) return;

    const t = themes[currentTheme];
    albumPreview.style.background = t.bg;
    albumHeader.style.borderColor = t.borderColor;
    titleDisplay.style.color = t.titleColor;

    // Gap map
    const gapMap = { 0: '0px', 2: '6px', 4: '14px' };
    photoGrid.style.gap = gapMap[gapSize] || '6px';
    photoGrid.className = `grid p-4 grid-${cols}`;

    photoCount.textContent = `${photos.length} fotografi${photos.length === 1 ? 'e' : 'i'}`;

    photoGrid.innerHTML = '';
    photos.forEach(photo => {
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.style.background = t.cardBg;
      card.dataset.id = photo.id;
      card.draggable = true;

      card.innerHTML = `
        <img src="${photo.dataUrl}" alt="${photo.caption || ''}" draggable="false" />
        <div class="overlay">
          <input class="caption-input" type="text" placeholder="Adaugă o legendă…" value="${photo.caption}" />
          <button class="btn-delete" title="Șterge fotografia">×</button>
        </div>
      `;

      // Caption save
      card.querySelector('.caption-input').addEventListener('input', e => {
        const p = photos.find(p => p.id == photo.id);
        if (p) p.caption = e.target.value;
      });

      // Delete
      card.querySelector('.btn-delete').addEventListener('click', e => {
        e.stopPropagation();
        photos = photos.filter(p => p.id != photo.id);
        renderGrid();
      });

      // Drag to reorder
      card.addEventListener('dragstart', () => {
        dragSrcId = photo.id;
        setTimeout(() => card.classList.add('dragging'), 0);
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
      });
      card.addEventListener('dragover', e => {
        e.preventDefault();
        card.classList.add('drag-target');
      });
      card.addEventListener('dragleave', () => card.classList.remove('drag-target'));
      card.addEventListener('drop', e => {
        e.preventDefault();
        card.classList.remove('drag-target');
        if (dragSrcId == photo.id) return;
        const srcIdx = photos.findIndex(p => p.id == dragSrcId);
        const dstIdx = photos.findIndex(p => p.id == photo.id);
        if (srcIdx < 0 || dstIdx < 0) return;
        const [moved] = photos.splice(srcIdx, 1);
        photos.splice(dstIdx, 0, moved);
        renderGrid();
      });

      photoGrid.appendChild(card);
    });
  }

  // ── Controls ───────────────────────────────────────────

  // Columns
  document.querySelectorAll('.col-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      cols = parseInt(btn.dataset.cols);
      document.querySelectorAll('.col-btn').forEach(b => {
        b.style.borderColor = '#4a4540';
        b.style.color = 'var(--color-muted)';
      });
      btn.style.borderColor = 'var(--color-amber)';
      btn.style.color = 'var(--color-amber)';
      renderGrid();
    });
  });

  // Gap
  document.querySelectorAll('.gap-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      gapSize = parseInt(btn.dataset.gap);
      document.querySelectorAll('.gap-btn').forEach(b => {
        b.style.borderColor = '#4a4540';
        b.style.color = 'var(--color-muted)';
      });
      btn.style.borderColor = 'var(--color-amber)';
      btn.style.color = 'var(--color-amber)';
      renderGrid();
    });
  });

  // Theme
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTheme = btn.dataset.theme;
      document.querySelectorAll('.theme-btn').forEach(b => b.style.borderColor = '#4a4540');
      btn.style.borderColor = 'var(--color-amber)';
      renderGrid();
    });
  });

  // Title / date sync
  titleInput.addEventListener('input', () => {
    titleDisplay.textContent = titleInput.value || 'Album fără titlu';
  });
  dateInput.addEventListener('change', () => {
    if (dateInput.value) {
      const d = new Date(dateInput.value + 'T00:00:00');
      dateDisplay.textContent = d.toLocaleDateString('ro-RO', { year:'numeric', month:'long', day:'numeric' });
    } else {
      dateDisplay.textContent = '';
    }
  });
  // Trigger once for default value
  dateInput.dispatchEvent(new Event('change'));

  // Clear
  document.getElementById('clear-btn').addEventListener('click', () => {
    if (photos.length === 0 || confirm('Ștergi toate fotografiile din album?')) {
      photos = [];
      renderGrid();
    }
  });

  // Print
  document.getElementById('print-btn').addEventListener('click', () => window.print());
</script>

</body>
</html>
